# =============================================================================
# AI Research Agent — Docker Compose
# =============================================================================
# Run the entire stack with: docker-compose up --build
# =============================================================================

version: '3.9'

services:
  # ── Backend (FastAPI + LangGraph + ChromaDB) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: research-agent-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_data
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React + Vite → Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: research-agent-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
  uploads:
    driver: local
